<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ADAPTACION MOVIL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atrapa </title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Poppins', sans-serif;
color:white;
text-align:center;
cursor:pointer;
background:black;
touch-action: manipulation;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* titulo */
h1{
font-family:'Pacifico', cursive;
font-size:40px;
margin-top:20px;
text-shadow:0 0 15px pink;
}

/* contador */
#contador{
font-size:22px;
margin-top:5px;
}

/* BOTON VOLVER */
#volver{
position:fixed;
top:20px;
left:20px;
padding:10px 18px;
font-size:16px;
border:none;
border-radius:10px;
background:pink;
color:black;
font-weight:600;
cursor:pointer;
box-shadow:0 0 10px pink;
}

#volver:hover{
transform:scale(1.1);
}

/* corazones */
.corazon{
position:absolute;
font-size:35px;
cursor:pointer;
animation: latido 1s infinite;
}

@keyframes latido{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* pantalla final */

#final{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#imagenFinal{
width:320px;
max-width:90vw;
border-radius:20px;
box-shadow:0 0 40px pink;
animation: aparecer 2s ease;
}

@keyframes aparecer{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}
}


/* -------------------- */
/* RESPONSIVE CELULAR   */
/* -------------------- */

@media (max-width:600px){

h1{
font-size:28px;
margin-top:60px;
}

#contador{
font-size:20px;
}

#volver{
font-size:14px;
padding:8px 14px;
top:15px;
left:15px;
}

.corazon{
font-size:42px;
}

#imagenFinal{
width:85vw;
}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="volver" onclick="volverAtras()">⬅ Volver</button>

<h1> Atrapa las Flores</h1>
<div id="contador">0 / 10</div>

<div id="final">
<img src="foto.jpg" id="imagenFinal">
</div>

<!-- sonido atrapar -->
<audio id="pop">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73467.mp3">
</audio>

<!-- musica fondo -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c1c9f6c5d.mp3">
</audio>

<script>

/* -------- fondo estrellas -------- */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let stars=[]

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.2

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}
})

requestAnimationFrame(drawStars)

}

drawStars()

/* -------- juego -------- */

let contador=0
let juegoTerminado=false

function crearCorazon(){

if(juegoTerminado) return

let corazon=document.createElement("div")
corazon.classList.add("corazon")
corazon.innerHTML="🌸"

corazon.style.left=Math.random()*window.innerWidth+"px"
corazon.style.top="-50px"

document.body.appendChild(corazon)

let velocidad=2+Math.random()*3

let movimiento=setInterval(()=>{

corazon.style.top=corazon.offsetTop+velocidad+"px"

if(corazon.offsetTop>window.innerHeight){

corazon.remove()
clearInterval(movimiento)

}

},20)

corazon.onclick=function(){

if(juegoTerminado) return

document.getElementById("pop").play()

contador++
document.getElementById("contador").innerText=contador+" / 10"

explosion(corazon.offsetLeft,corazon.offsetTop)

corazon.remove()
clearInterval(movimiento)

if(contador>=10){
finalJuego()
}

}

}

setInterval(crearCorazon,900)

/* -------- explosion corazones -------- */

function explosion(x,y){

for(let i=0;i<8;i++){

let part=document.createElement("div")
part.innerHTML="🌸"
part.style.position="absolute"
part.style.left=x+"px"
part.style.top=y+"px"
part.style.fontSize="20px"

document.body.appendChild(part)

let dx=(Math.random()-0.5)*200
let dy=(Math.random()-0.5)*200

part.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],{
duration:800
})

setTimeout(()=>part.remove(),800)

}

}

/* -------- final juego -------- */

function finalJuego(){

if(juegoTerminado) return
juegoTerminado=true

document.getElementById("final").style.display="block"

}

/* -------- boton volver -------- */

function volverAtras(){
window.location.href="prin.html";
}

</script>

</body>
</html>
