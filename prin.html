<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flor</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--petalColor: linear-gradient(145deg,#ff66cc,#ffccff,#ff99ff);
--glowColor:#ff99ff;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:flex-end;
background:linear-gradient(to top,#bfe9ff,#87cefa,#6ec6ff);
overflow:hidden;
font-family:sans-serif;
transition:background 2s ease;
}

.pink-sky{
background:linear-gradient(to top,#ff9ecf,#ffc1e3,#ffd6f0)!important;
}

.stars{position:fixed;width:100%;height:100%;z-index:0;}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.4;
animation:twinkle 3s ease-in-out infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:0.8;}
}

/* ☀️ SOL */

.sun{
position:fixed;
top:60px;
right:80px;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#fff799,#ffd900,#ffb700);
box-shadow:0 0 40px #ffd900,0 0 80px #ffcc00;
animation:floatSun 6s ease-in-out infinite alternate;
z-index:1;

cursor:pointer;
transition:transform .3s ease,box-shadow .3s ease,filter .3s ease;
}

.sun:hover{
transform:scale(1.15);
box-shadow:
0 0 60px #ffd900,
0 0 120px #ffcc00,
0 0 200px #fff176;
filter:brightness(1.2);
}

@keyframes floatSun{
from{transform:translateY(0);}
to{transform:translateY(15px);}
}

/* nubes */

.cloud{
position:fixed;
background:rgba(255,255,255,0.85);
border-radius:50px;
filter:blur(1.5px);
z-index:1;
animation:moveCloud linear infinite;
}

.cloud::before,.cloud::after{
content:"";
position:absolute;
background:rgba(255,255,255,0.85);
border-radius:50%;
}

.cloud.small{
width:120px;
height:50px;
top:120px;
left:-150px;
animation-duration:70s;
}

.cloud.small::before{
width:60px;
height:60px;
top:-25px;
left:15px;
}

.cloud.small::after{
width:70px;
height:70px;
top:-30px;
right:15px;
}

.cloud.medium{
width:180px;
height:70px;
top:180px;
left:-250px;
animation-duration:100s;
}

.cloud.medium::before{
width:90px;
height:90px;
top:-40px;
left:30px;
}

.cloud.medium::after{
width:100px;
height:100px;
top:-45px;
right:25px;
}

@keyframes moveCloud{
from{transform:translateX(0);}
to{transform:translateX(120vw);}
}

/* pasto */

.grass{
position:absolute;
bottom:0;
width:100%;
height:90px;
overflow:hidden;
z-index:1;
}

.grass svg{
position:absolute;
bottom:0;
width:200%;
height:100%;
animation:moveGrass 20s linear infinite;
}

@keyframes moveGrass{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* contenedor */

.wrapper{
position:relative;
height:450px;
z-index:2;
}

/* tallo */

.stem{
position:absolute;
bottom:0;
left:50%;
width:8px;
height:0;
background:linear-gradient(to top,#00aa55,#00ff88);
border-radius:10px;
transform:translateX(-50%);
animation:growStem 2s ease-out forwards;
}

/* hoja */

.leaf{
position:absolute;
width:110px;
height:55px;
background:linear-gradient(45deg,#00aa55,#00ff88);
border-radius:120px 0;
opacity:0;
}

.leaf.left{
bottom:120px;
left:50%;
transform:translateX(-100%) rotate(-40deg) scale(0);
animation:leafGrow 1s ease-out forwards 1.8s;
}

/* flor */

.flower{
position:absolute;
bottom:240px;
left:50%;
width:170px;
height:170px;
transform:translateX(-50%);
transition:transform 0.3s ease,filter 0.4s ease;
cursor:pointer;
filter: drop-shadow(0 0 15px var(--glowColor))
drop-shadow(0 0 30px var(--glowColor));
}

.flower:hover{
transform:translateX(-50%) scale(1.15);
filter:
drop-shadow(0 0 25px var(--glowColor))
drop-shadow(0 0 50px var(--glowColor))
drop-shadow(0 0 80px var(--glowColor));
}

/* pétalos */

.petal{
position:absolute;
width:75px;
height:135px;
background:var(--petalColor);
border-radius:50%;
top:17.5px;
left:47.5px;
transform-origin:bottom center;
transform:scale(0) rotate(var(--r));
box-shadow:0 0 20px var(--glowColor),
inset 0 0 15px rgba(255,255,255,0.5);
animation:bloom .6s ease-out forwards,
vibrate 3s ease-in-out infinite 4s;
}

.petal:nth-child(1){--r:0deg;animation-delay:2.2s,4s;}
.petal:nth-child(2){--r:45deg;animation-delay:2.4s,4s;}
.petal:nth-child(3){--r:90deg;animation-delay:2.6s,4s;}
.petal:nth-child(4){--r:135deg;animation-delay:2.8s,4s;}
.petal:nth-child(5){--r:180deg;animation-delay:3s,4s;}
.petal:nth-child(6){--r:225deg;animation-delay:3.2s,4s;}
.petal:nth-child(7){--r:270deg;animation-delay:3.4s,4s;}
.petal:nth-child(8){--r:315deg;animation-delay:3.6s,4s;}

@keyframes growStem{from{height:0;}to{height:240px;}}
@keyframes leafGrow{to{opacity:1;transform:translateX(-100%) rotate(-40deg) scale(1);}}
@keyframes bloom{to{transform:scale(1) rotate(var(--r));}}
@keyframes vibrate{0%,100%{transform:scale(1) rotate(var(--r));}50%{transform:scale(1.02) rotate(var(--r));}}

/* corazón */

.heart-container{
position:absolute;
bottom:260px;
left:50%;
transform:translateX(-50%) scale(0);
text-align:center;
z-index:9999;
opacity:0;
}

.heart-container.show{animation:riseHeart 4s ease forwards;}

@keyframes riseHeart{
0%{transform:translateX(-50%) translateY(0) scale(0);opacity:0;}
30%{transform:translateX(-50%) translateY(-80px) scale(1);opacity:1;}
100%{transform:translateX(-50%) translateY(-250px) scale(1.1);opacity:1;}
}

.heart{font-size:120px;animation:heartbeat 1.2s infinite;}

@keyframes heartbeat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

.heart-text{
margin-top:20px;
font-size:26px;
max-width:700px;
color:white;
font-family:'Dancing Script',cursive;
text-align:center;
text-shadow:0 0 20px rgba(0,0,0,.6);
opacity:0;
transition:opacity 2s ease;
}

.heart-text.show{opacity:1;}

</style>
</head>

<body>

<div class="stars"></div>

<!-- SOL BOTÓN -->
<div class="sun" onclick="goTree()"></div>

<div class="cloud small"></div>
<div class="cloud medium"></div>

<div class="grass">
<svg viewBox="0 0 1200 100" preserveAspectRatio="none">
<path d="M0,80 Q50,40 100,80 T200,80 T300,80 T400,80 T500,80 T600,80 T700,80 T800,80 T900,80 T1000,80 T1100,80 T1200,80 L1200,100 L0,100 Z" fill="url(#grassGradient)"/>
<defs>
<linearGradient id="grassGradient" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#00cc66"/>
<stop offset="100%" stop-color="#006633"/>
</linearGradient>
</defs>
</svg>
</div>

<div class="wrapper">
<div class="stem"></div>
<div class="leaf left"></div>

<div class="flower">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
</div>

<div class="heart-container" id="heartContainer">
<div class="heart">💗</div>
<div class="heart-text" id="heartText">
"Más preciosa es que las piedras preciosas;
Y todo lo que puedes desear, no se puede comparar a ella".
<br><br>
<span style="font-family:'Playfair Display',serif;font-size:20px;">
Proverbios 3:15
</span>
</div>
</div>
</div>

<script>

function goTree(){
window.location.href="tree.html";
}

const starsContainer=document.querySelector('.stars');

for(let i=0;i<50;i++){
const star=document.createElement('div');
star.classList.add('star');
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
starsContainer.appendChild(star);
}

const flower=document.querySelector(".flower");
const heartContainer=document.getElementById("heartContainer");
const heartText=document.getElementById("heartText");

const colors=[
{petal:"linear-gradient(145deg,#ff66cc,#ffccff,#ff99ff)",glow:"#ff99ff"},
{petal:"linear-gradient(145deg,#fff176,#ffd54f,#ffca28)",glow:"#ffd54f"},
{petal:"linear-gradient(145deg,#f5e6d3,#e8d5b5,#d8c3a5)",glow:"#e8d5b5"},
{petal:"linear-gradient(145deg,#81d4fa,#4fc3f7,#29b6f6)",glow:"#4fc3f7"},
{petal:"linear-gradient(145deg,#c084fc,#a855f7,#9333ea)",glow:"#a855f7"}
];

let current=0;

flower.addEventListener("dblclick",()=>{

current++;

if(current<colors.length){

document.documentElement.style.setProperty("--petalColor",colors[current].petal);
document.documentElement.style.setProperty("--glowColor",colors[current].glow);

}

if(current===colors.length){

document.body.classList.add("pink-sky");

heartContainer.classList.add("show");

setTimeout(()=>{
heartText.classList.add("show");
},2500);

}

});

heartContainer.addEventListener("click",()=>{

heartContainer.style.transition="all 1.5s ease";
heartContainer.style.opacity="0";
heartContainer.style.transform="translateX(-50%) translateY(-300px) scale(0.5)";

document.body.classList.remove("pink-sky");

setTimeout(()=>{
heartContainer.classList.remove("show");
heartText.classList.remove("show");
heartContainer.style="";
current=0;
},1500);

});

</script>

<audio id="music" loop></audio>

<div style="position:fixed;bottom:20px;right:20px;display:flex;gap:10px;z-index:999;">
<button onclick="toggleMusic()" style="width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,0.6);backdrop-filter:blur(6px);cursor:pointer;">🎵</button>
<button onclick="nextSong()" style="width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,0.6);backdrop-filter:blur(6px);cursor:pointer;">⏭</button>
</div>

<script>

const music=document.getElementById("music");

const playlist=[
"cancion1.mp3",
"cancion2.mp3",
"cancion3.mp3",
"cancion4.mp3",
"cancion5.mp3",
"cancion6.mp3",
"cancion7.mp3",
"cancion8.mp3",
"cancion9.mp3",
"cancion10.mp3",
"cancion11.mp3"
];

let currentSong=parseInt(localStorage.getItem("currentSong"))||0;

music.src=playlist[currentSong];

window.addEventListener("load",()=>{

const savedTime=localStorage.getItem("musicTime");
const wasPlaying=localStorage.getItem("musicPlaying");

if(savedTime){
music.currentTime=parseFloat(savedTime);
}

if(wasPlaying==="true"){
music.play();
}

});

music.addEventListener("timeupdate",()=>{
localStorage.setItem("musicTime",music.currentTime);
});

window.addEventListener("beforeunload",()=>{
localStorage.setItem("musicTime",music.currentTime);
});

function toggleMusic(){

if(music.paused){
music.play();
localStorage.setItem("musicPlaying","true");
}

else{
music.pause();
localStorage.setItem("musicPlaying","false");
}

}

function nextSong(){

currentSong=(currentSong+1)%playlist.length;

localStorage.setItem("currentSong",currentSong);
localStorage.setItem("musicTime",0);

music.src=playlist[currentSong];

music.play();

localStorage.setItem("musicPlaying","true");

}

</script>

</body>
</html>
